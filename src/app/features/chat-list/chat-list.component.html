<div class="sidebar">
  <!-- Верхняя панель: Поиск + Logout -->
  <div class="sidebar-header">
    <div class="search-container">
      <input
        #searchInput
        type="text"
        placeholder="Поиск по email..."
        class="search-input"
        (input)="onSearchChange($event)"
      />
      <button class="logout-btn" (click)="logout()" title="Выйти" type="button">
        <img src="icons/logout.svg" alt="" />
      </button>
    </div>

    <!-- Результаты поиска -->
    <div class="search-results" *ngIf="searchResults.length > 0">
      <p class="section-title">Найденные пользователи:</p>
      <div
        *ngFor="let user of searchResults"
        class="user-item"
        (click)="startChat(user)"
      >
        <img [src]="user.photoURL || '/images/avatar-placeholder.jpg'" class="mini-avatar" />
        <span>{{ user.displayName }}</span>
      </div>
    </div>
  </div>

  <!-- Список чатов -->
  <div class="chats-scroll">
    <div
      *ngFor="let chat of filteredChats"
      [routerLink]="['/chat', chat.id]"
      routerLinkActive="active"
      class="chat-item"
    >
      <div class="avatar-wrapper">
        <img [src]="chat.avatar" class="avatar" alt="avatar" />
        <div *ngIf="chat.online" class="online-badge"></div>
      </div>
      <div class="chat-info">
        <div class="chat-top">
          <span class="name">{{ chat.name }}</span>
          <span class="time">{{ chat.timestamp | date: "HH:mm" }}</span>
        </div>
        <p class="last-msg">{{ chat.lastMessage }}</p>
      </div>
      <span class="unread-count" *ngIf="chat.unreadCount > 0">{{ chat.unreadCount }}</span>
    </div>
  </div>

  <p *ngIf="!filteredChats.length" class="empty-state">Ничего не найдено</p>
</div>
