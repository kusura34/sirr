<div class="sidebar-container">
  <!-- Поиск -->
  <div class="search-section">
    <div class="search-bar">
      <i class="lucide-search"></i>
      <input type="text" placeholder="Поиск чатов...">
    </div>
  </div>

  <!-- Список чатов -->
  <div class="chats-list">
    <div *ngFor="let chat of chats" 
         class="chat-item" 
         (click)="selectChat(chat.id)">
      
      <div class="avatar-wrapper">
        <img [src]="chat.avatar" alt="Avatar" class="chat-avatar">
        <span *ngIf="chat.online" class="online-status"></span>
      </div>

      <div class="chat-info">
        <div class="chat-row">
          <span class="chat-name">{{ chat.name }}</span>
          <span class="chat-time">{{ chat.timestamp | date:'HH:mm' }}</span>
        </div>
        <div class="chat-row">
          <p class="last-message">{{ chat.lastMessage }}</p>
          <span *ngIf="chat.unreadCount > 0" class="unread-badge">
            {{ chat.unreadCount }}
          </span>
        </div>
      </div>
    </div>
  </div>
</div>
