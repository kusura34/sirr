<div class="message-container" [class.mine]="isMine">
  <div class="bubble">
    <p class="text">{{ message.text }}</p>
    <div class="meta">
      <span class="time">{{ message.timestamp?.toDate() | date:'HH:mm' }}</span>
      <span *ngIf="isMine" class="status" [class.read]="message.isRead">✓✓</span>
    </div>
  </div>
</div>
