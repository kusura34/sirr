<div class="window-wrapper">
  <app-chat-header [chatName]="(chatName$ | async)" [isOnline]="(isOnline$ | async)"></app-chat-header>
  
  <div class="messages-viewport">
    <app-chat-message 
      *ngFor="let msg of (messages$ | async)" 
      [message]="msg"
      [isMine]="msg.senderId === (myId$ | async)">
    </app-chat-message>
  </div>

  <app-chat-input (onSend)="send($event)"></app-chat-input>
</div>
